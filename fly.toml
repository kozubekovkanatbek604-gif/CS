# Имя должно совпадать с App name в панели Fly (латиница, дефисы).
app = 'cs-cybersecurity-website'
primary_region = 'ams'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

# Volume: создайте в Fly Dashboard → Storage → Create volume
# (name: data, region: ams, size: 1 GB), затем раскомментируйте и redeploy:
#
# [mounts]
#   source = 'data'
#   destination = '/app/backend/data'
