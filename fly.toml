# Имя должно совпадать с App name в панели Fly.
app = 'cs-cybersecurity-website'
primary_region = 'ams'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '8080'
  DATABASE_PATH = '/data/app.db'

[deploy]
  strategy = 'rolling'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

# SQLite на volume. initial_size — том создаётся при первом fly deploy / launch.
[mounts]
  source = 'data'
  destination = '/data'
  initial_size = '1gb'
