# fly.toml app configuration file generated for cs-cybersecurity-website on 2026-05-18T13:52:09Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'cs-cybersecurity-website'
primary_region = 'ams'

[build]

[deploy]
  strategy = 'rolling'

[env]
  DATABASE_PATH = '/data/app.db'
  NODE_ENV = 'production'
  PORT = '8080'

[[mounts]]
  source = 'data'
  destination = '/data'
  initial_size = '1gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
